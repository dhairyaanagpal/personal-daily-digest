<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Morning Briefing{% endblock %} — PDD</title>

  <!-- Tailwind CSS via CDN — no build step needed -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Inter"', 'system-ui', 'sans-serif'],
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          colors: {
            amber: { 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706' },
          },
          animation: {
            'fade-up': 'fadeUp 0.5s ease forwards',
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(16px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Custom styles -->
  <link rel="stylesheet" href="{{ css_path }}" />

  <style>
    /* Staggered fade-in for sections */
    .section-card { opacity: 0; animation: fadeUp 0.5s ease forwards; }
    .section-card:nth-child(1) { animation-delay: 0.1s; }
    .section-card:nth-child(2) { animation-delay: 0.2s; }
    .section-card:nth-child(3) { animation-delay: 0.3s; }
    .section-card:nth-child(4) { animation-delay: 0.4s; }
    .section-card:nth-child(5) { animation-delay: 0.5s; }

    /* Section color pills */
    .pill-purple  { background: #ede9fe; color: #7c3aed; }
    .pill-teal    { background: #ccfbf1; color: #0f766e; }
    .pill-orange  { background: #ffedd5; color: #c2410c; }
    .pill-green   { background: #dcfce7; color: #15803d; }
    .pill-pink    { background: #fce7f3; color: #be185d; }

    /* Dark mode pills */
    .dark .pill-purple  { background: #3b0764; color: #c4b5fd; }
    .dark .pill-teal    { background: #042f2e; color: #5eead4; }
    .dark .pill-orange  { background: #431407; color: #fed7aa; }
    .dark .pill-green   { background: #052e16; color: #86efac; }
    .dark .pill-pink    { background: #500724; color: #f9a8d4; }

    /* Section header border colors */
    .border-purple { border-color: #7c3aed; }
    .border-teal   { border-color: #0f766e; }
    .border-orange { border-color: #c2410c; }
    .border-green  { border-color: #15803d; }
    .border-pink   { border-color: #be185d; }

    /* Smooth scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }

    /* Story card hover */
    .story-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .story-card:hover { transform: translateY(-2px); }
  </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300 min-h-screen font-sans">

  <!-- TOP BAR -->
  <div class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm border-b border-slate-200 dark:border-slate-700">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-amber-500 text-lg">📰</span>
        <span class="font-semibold text-sm text-slate-600 dark:text-slate-400 tracking-wide uppercase">Personal Daily Digest</span>
      </div>
      <button
        id="darkModeToggle"
        onclick="toggleDark()"
        class="p-2 rounded-full text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
        title="Toggle dark mode"
        aria-label="Toggle dark mode"
      >
        <span id="darkIcon" class="hidden dark:inline">☀️</span>
        <span id="lightIcon" class="dark:hidden">🌙</span>
      </button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="max-w-4xl mx-auto px-4 sm:px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- ARCHIVE NAVIGATION -->
  {% if archive_links %}
  <div class="max-w-4xl mx-auto px-4 sm:px-6 pb-8">
    <div class="border-t border-slate-200 dark:border-slate-700 pt-8">
      <h3 class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-3">Recent Digests</h3>
      <div class="flex flex-wrap gap-2">
        {% for link in archive_links %}
        <a href="{{ link.path }}" class="text-xs px-3 py-1.5 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-amber-100 dark:hover:bg-amber-900/30 hover:text-amber-700 dark:hover:text-amber-400 transition-colors">
          {{ link.label }}
        </a>
        {% endfor %}
      </div>
    </div>
  </div>
  {% endif %}

  <!-- FOOTER -->
  <footer class="border-t border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 py-6 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-slate-500 dark:text-slate-500">
      <span>Generated at {{ generated_time }} IST by PDD Agent</span>
      <a href="https://github.com" class="hover:text-amber-500 transition-colors">View on GitHub →</a>
    </div>
  </footer>

  <script>
    // ─── Dark mode persistence ───────────────────
    function toggleDark() {
      const html = document.documentElement;
      html.classList.toggle('dark');
      localStorage.setItem('pdd-theme', html.classList.contains('dark') ? 'dark' : 'light');
    }

    // Apply saved preference on load
    (function() {
      const saved = localStorage.getItem('pdd-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();

    // ─── Collapsible sources ─────────────────────
    function toggleSources() {
      const el = document.getElementById('sources-list');
      if (el) el.classList.toggle('hidden');
    }
  </script>
</body>
</html>
